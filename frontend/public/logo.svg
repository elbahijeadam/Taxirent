<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 50" role="img" aria-label="Taxi Rent">

  <!-- ══ TAXI ROUGE (gauche) ══ -->
  <g transform="translate(2,8)">
    <rect x="0" y="11" width="40" height="14" rx="3" fill="#e53e3e"/>
    <path d="M6 11 L11 3 L29 3 L34 11Z" fill="#e53e3e"/>
    <path d="M12 10 L15 4.5 L28 4.5 L30 10Z" fill="white" opacity="0.2"/>
    <rect x="14" y="0" width="12" height="4.5" rx="1.5" fill="#c53030" stroke="white" stroke-width="0.7"/>
    <text x="15.5" y="4" font-family="Arial,sans-serif" font-weight="900" font-size="3.5" fill="white">TAXI</text>
    <text x="7" y="22" font-family="Arial,sans-serif" font-weight="900" font-size="5.5" fill="white">TAXI</text>
    <circle cx="9"  cy="25" r="5.5" fill="#111"/><circle cx="9"  cy="25" r="2.8" fill="#e53e3e"/>
    <circle cx="31" cy="25" r="5.5" fill="#111"/><circle cx="31" cy="25" r="2.8" fill="#e53e3e"/>
  </g>

  <!-- ══ PERSONNE MARCHANT (centre, blanche) ══ -->
  <g transform="translate(44,4)" fill="white">
    <!-- tête -->
    <circle cx="9" cy="5" r="4.5"/>
    <!-- corps incliné vers l'avant -->
    <path d="M6 10 L5 22 L9 22 L10 10Z"/>
    <!-- bras gauche (arrière) -->
    <path d="M6 12 L1 17 L3 18 L7 14Z"/>
    <!-- bras droit (avant) -->
    <path d="M9 12 L15 15 L14 17 L8 14Z"/>
    <!-- jambe gauche (avant, avancée) -->
    <path d="M6 22 L3 34 L6 34 L8 22Z"/>
    <!-- jambe droite (arrière) -->
    <path d="M8 22 L12 33 L15 32 L10 22Z"/>
  </g>

  <!-- ══ TAXI VERT (droite) ══ -->
  <g transform="translate(62,8)">
    <rect x="0" y="11" width="40" height="14" rx="3" fill="#16a34a"/>
    <path d="M6 11 L11 3 L29 3 L34 11Z" fill="#16a34a"/>
    <path d="M12 10 L15 4.5 L28 4.5 L30 10Z" fill="white" opacity="0.2"/>
    <rect x="14" y="0" width="12" height="4.5" rx="1.5" fill="#15803d" stroke="white" stroke-width="0.7"/>
    <text x="15.5" y="4" font-family="Arial,sans-serif" font-weight="900" font-size="3.5" fill="white">TAXI</text>
    <text x="2"  y="22" font-family="Arial,sans-serif" font-weight="900" font-size="5" fill="white">TAXIRENT</text>
    <circle cx="9"  cy="25" r="5.5" fill="#111"/><circle cx="9"  cy="25" r="2.8" fill="#16a34a"/>
    <circle cx="31" cy="25" r="5.5" fill="#111"/><circle cx="31" cy="25" r="2.8" fill="#16a34a"/>
  </g>

  <!-- ══ TEXTE "TAXI RENT" à droite ══ -->
  <text x="116" y="22" font-family="Arial,sans-serif" font-weight="900" font-size="18" fill="white" letter-spacing="1">TAXI</text>
  <text x="116" y="42" font-family="Arial,sans-serif" font-weight="300" font-size="18" fill="#16a34a" letter-spacing="3">RENT</text>

</svg>
